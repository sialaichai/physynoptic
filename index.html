<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synoptic Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js?v=1.0.1"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        
        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #e0e0e0; z-index: 10000; 
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center;
            width: 90%; max-width: 400px;
        }
        .login-box h2 { margin-top: 0; color: #333; }
        .login-box p { color: #666; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box;
            outline: none; transition: border 0.3s;
        }
        .login-box input:focus { border-color: #007bff; }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        .login-box button:hover { background: #0056b3; }
        .error { 
            color: #d9534f; margin-top: 15px; display: none; 
            background: #f9d6d5; border: 1px solid #d9534f; padding: 10px;
            font-size: 13px; border-radius: 4px; text-align: left;
        }
        .status { color: #0275d8; margin-top: 15px; font-size: 14px; font-weight: 500; display: block; }

        /* MAIN APP LAYOUT */
        #main-container { display: none; flex-direction: column; height: 100vh; }
        #upper-panel { flex: 1; display: flex; flex-direction: column; min-height: 150px; }
        #lower-panel { height: 300px; min-height: 100px; overflow-y: auto; background: white; }
        #dragger { height: 5px; background: #ccc; cursor: ns-resize; border-top: 1px solid #aaa; border-bottom: 1px solid #aaa; }
        
        /* CONTROLS BAR */
        #controls { 
            padding: 10px; background: #f4f4f4; display: flex; 
            align-items: center; gap: 10px; flex-wrap: wrap; 
            border-bottom: 1px solid #ddd; 
        }
        #pdf-viewer-container { flex: 1; background: #525659; }
        #pdf-viewer { width: 100%; height: 100%; border: none; }
        
        /* TABLE STYLES */
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; cursor: pointer; position: sticky; top: 0; user-select: none; }
        th:hover { background-color: #e2e6ea; }
        tbody tr:hover { background-color: #e2e6ea; cursor: pointer; }
        
        /* FILTER BUTTONS & DROPDOWNS */
        .dropdown-check-container { position: relative; display: inline-block; }
        .filter-button { 
            padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; 
            background: white; min-width: 100px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .dropdown-panel { 
            display: none; position: absolute; background: white; 
            border: 1px solid #ccc; box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            z-index: 100; min-width: 200px; padding: 10px; border-radius: 4px; 
        }
        .dropdown-list { max-height: 250px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .dropdown-list label { display: block; padding: 6px; cursor: pointer; }
        .dropdown-list label:hover { background-color: #f4f4f4; }
        .apply-button { 
            width: 100%; padding: 8px; background: #007bff; color: white; 
            border: none; border-radius: 4px; cursor: pointer;
        }
        .apply-button:hover { background-color: #0056b3; }

        /* UTILS */
        #generate-html-btn { 
            background-color: #28a745; color: white; padding: 8px 12px; 
            border: none; border-radius: 4px; font-weight: bold; 
            cursor: pointer; font-size: 14px; 
        }
        #generate-html-btn:hover { background-color: #218838; }
        
        #file-count-display { font-weight: bold; color: #555; margin-left: 10px; }

        /* TABLE COLUMNS */
        #data-table th:nth-child(1), #data-table td:nth-child(1) { width: 20%; } /* Filename */
        #data-table th:nth-child(2), #data-table td:nth-child(2) { width: 20%; } /* Topic 1 */
        #data-table th:nth-child(3), #data-table td:nth-child(3) { width: 20%; } /* Topic 2 */
        #data-table th:nth-child(4), #data-table td:nth-child(4) { width: 20%; } /* Topic 3 */
        #data-table th:nth-child(5), #data-table td:nth-child(5) { width: 20%; } /* Topic 4 */

        /* PDF HOVER PREVIEW POP-UP */
        #pdf-preview-popup {
            position: fixed;
            display: none;
            width: 450px;
            height: 550px;
            border: 2px solid #007bff;
            border-radius: 8px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 10001;
            pointer-events: none; /* Prevents the pop-up from interfering with mouse movement */
            overflow: hidden;
        }
        #pdf-preview-popup iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Restricted Access</h2>
            <p>Enter password to unlock synoptic data</p>
            <p>Clear Browser Cache for latest updates</p>
            <input type="password" id="pass-input" placeholder="Password" onkeypress="handleEnter(event)">
            <button onclick="unlock()">Login</button>
            <div id="status-msg" class="status">Initializing...</div>
            <div id="error-msg" class="error"></div>
        </div>
    </div>

    <div id="pdf-preview-popup">
        <iframe id="preview-iframe" src=""></iframe>
    </div>
    
    <div id="main-container">
        <div id="upper-panel">
            <div id="controls">
                
                <div class="dropdown-check-container">
                    <button id="topic1-filter-btn" class="filter-button">Topic 1 (<span id="topic1-filter-count">0</span>)</button>
                    <div id="topic1-filter-panel" class="dropdown-panel">
                        <div id="topic1-filter-list" class="dropdown-list"></div>
                        <button id="topic1-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>
                
                <div class="dropdown-check-container">
                    <button id="topic2-filter-btn" class="filter-button">Topic 2 (<span id="topic2-filter-count">0</span>)</button>
                    <div id="topic2-filter-panel" class="dropdown-panel">
                        <div id="topic2-filter-list" class="dropdown-list"></div>
                        <button id="topic2-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>

                <div class="dropdown-check-container">
                    <button id="topic3-filter-btn" class="filter-button">Topic 3 (<span id="topic3-filter-count">0</span>)</button>
                    <div id="topic3-filter-panel" class="dropdown-panel">
                        <div id="topic3-filter-list" class="dropdown-list"></div>
                        <button id="topic3-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>

                <div class="dropdown-check-container">
                    <button id="topic4-filter-btn" class="filter-button">Topic 4 (<span id="topic4-filter-count">0</span>)</button>
                    <div id="topic4-filter-panel" class="dropdown-panel">
                        <div id="topic4-filter-list" class="dropdown-list"></div>
                        <button id="topic4-filter-apply" class="apply-button">Apply</button>
                    </div>
                </div>
                
                <button id="generate-html-btn">HTML</button>
                <button id="merge-pdf-btn" style="background-color: #007bff; color: white; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">PDFs</button>
                <button id="download-zip-btn" style="background-color: #ff9800; color: white; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px;">ZIP</button>
                <span id="file-count-display"></span>
              
            </div>
            <div id="pdf-viewer-container"><iframe id="pdf-viewer" src="" frameborder="0"></iframe></div>
        </div>

        <div id="dragger"></div>

        <div id="lower-panel">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Filename</th>
                        <th>Topic 1</th>
                        <th>Topic 2</th>
                        <th>Topic 3</th>
                        <th>Topic 4</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </div>
    </div> 

    <script>
    // CONFIGURATION
    const PAYLOAD_FILE = 'synoptic_payload.enc';
    const UPDATES_FILE = 'updates.json'; 
    let PDF_FOLDER = ''; 
    let ENCRYPTED_TEXT = '';

    const statusEl = document.getElementById('status-msg');
    const errorEl = document.getElementById('error-msg');

    function logError(msg) {
        errorEl.style.display = 'block';
        errorEl.textContent = msg;
        statusEl.style.display = 'none';
        console.error(msg);
    }

    function logStatus(msg) {
        statusEl.textContent = msg;
        statusEl.style.display = 'block';
        errorEl.style.display = 'none';
    }

    // 1. PRELOAD ENCRYPTED DATA
    logStatus("Loading secure data...");
    
    fetch(PAYLOAD_FILE)
        .then(res => {
            if(!res.ok) throw new Error(`Fetch Failed: ${res.status} ${res.statusText}`);
            return res.text();
        })
        .then(text => { 
            if (!text || text.length === 0) throw new Error("payload is EMPTY.");
            ENCRYPTED_TEXT = text.trim();
            logStatus(`Ready.`);
            
            // Auto-Login Check
            const savedPass = sessionStorage.getItem('synoptic_session_key');
            if(savedPass) {
                logStatus("Restoring Session...");
                document.getElementById('pass-input').value = savedPass;
                unlock(true); 
            }
        })
        .catch(err => {
            logError(`Error: Could not find '${PAYLOAD_FILE}'.\nDid you upload it to GitHub?`);
        });

    function handleEnter(e) { if(e.key === 'Enter') unlock(); }

    // 2. UNLOCK FUNCTION
    function unlock(isAuto = false) {
        const passInput = document.getElementById('pass-input');
        const pass = passInput.value;
        
        if (!pass) { if(!isAuto) logError("Please enter a password."); return; }
        if (!ENCRYPTED_TEXT) { logError("Data not loaded."); return; }

        if(!isAuto) logStatus("Decrypting...");

        setTimeout(() => {
            try {
                const bytes = CryptoJS.AES.decrypt(ENCRYPTED_TEXT, pass);
                if (bytes.sigBytes < 0) throw new Error("Decryption Key Mismatch.");
                
                let decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedStr) throw new Error("Incorrect Password.");

                let bundle = JSON.parse(decryptedStr);
                
                // Success
                sessionStorage.setItem('synoptic_session_key', pass);
                PDF_FOLDER = bundle.secure_folder;
                let mainData = bundle.data;

                // Check for Updates (Hybrid Mode)
                logStatus("Checking for updates...");
                fetch(UPDATES_FILE)
                    .then(res => {
                        if (res.status === 404) return []; 
                        if (!res.ok) throw new Error("Update check failed");
                        return res.json();
                    })
                    .then(updateData => {
                        if(Array.isArray(updateData) && updateData.length > 0) {
                            console.log(`Merging ${updateData.length} new items.`);
                            mainData = mainData.concat(updateData);
                        }
                        startApp(mainData);
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-container').style.display = 'flex';
                    })
                    .catch(err => {
                        console.warn("Update fetch error:", err);
                        startApp(mainData); 
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-container').style.display = 'flex';
                    });

            } catch (e) {
                if(isAuto) {
                    sessionStorage.removeItem('synoptic_session_key');
                    passInput.value = '';
                    logStatus("Session expired. Please login.");
                } else {
                    logError(e.message);
                }
            }
        }, 100);
    }

    // 3. MAIN APP LOGIC
    function startApp(allData) {
        
        // --- STATE VARIABLES ---
        let selectedTopic1 = new Set();
        let selectedTopic2 = new Set();
        let selectedTopic3 = new Set();
        let selectedTopic4 = new Set();
        
        const tableBody = document.getElementById('data-table-body');
        const pdfViewer = document.getElementById('pdf-viewer');
        const fileCountDisplay = document.getElementById('file-count-display');
        
        // --- NORMALIZE DATA ---
        allData = allData.map(item => ({
            filename: (item.filename || '').trim(),
            Topic1: (item.Topic1 || '').trim(),
            Topic2: (item.Topic2 || '').trim(),
            Topic3: (item.Topic3 || '').trim(),
            Topic4: (item.Topic4 || '').trim()
        }));

        // --- NEW: Sort State & Listeners ---
        let currentFilteredData = [...allData]; 
        let currentSort = { column: 0, asc: true }; // Default: Filename (index 0), Ascending
        const baseHeaders = ['Filename', 'Topic 1', 'Topic 2', 'Topic 3', 'Topic 4'];
        const headers = document.querySelectorAll('#data-table th');
        
        headers.forEach((th, index) => {
            th.addEventListener('click', () => {
                if (currentSort.column === index) {
                    currentSort.asc = !currentSort.asc;
                } else {
                    currentSort.column = index;
                    currentSort.asc = true; // Default to ascending for new string columns
                }
                renderTable(currentFilteredData);
            });
        });

        populateDropdowns(allData);
        setupEventListeners(allData);
        renderTable(currentFilteredData);

        function populateDropdowns(data) {
            const getUniques = (mapper) => [...new Set(data.map(mapper).flat().filter(Boolean))]
                .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

            const t1 = getUniques(i => i.Topic1);
            const t2 = getUniques(i => i.Topic2);
            const t3 = getUniques(i => i.Topic3);
            const t4 = getUniques(i => i.Topic4);

            const setupList = (id, arr, cls) => {
                const el = document.getElementById(id);
                if(!el) return; el.innerHTML = '';
                arr.forEach(v => {
                    const l = document.createElement('label');
                    const c = document.createElement('input'); c.type='checkbox'; c.className=cls; c.value=v;
                    l.appendChild(c); l.appendChild(document.createTextNode(' '+v)); el.appendChild(l);
                });
            }
            setupList('topic1-filter-list', t1, 'topic1-checkbox');
            setupList('topic2-filter-list', t2, 'topic2-checkbox');
            setupList('topic3-filter-list', t3, 'topic3-checkbox');
            setupList('topic4-filter-list', t4, 'topic4-checkbox');
        }

        function setupEventListeners(data) {
            const setup = (btnId, panelId, listId, applyId, set, cls) => {
                const btn = document.getElementById(btnId), panel = document.getElementById(panelId);
                const list = document.getElementById(listId), apply = document.getElementById(applyId);
                if(!btn) return;
                btn.addEventListener('click', () => panel.style.display = panel.style.display === 'block' ? 'none' : 'block');
                apply.addEventListener('click', () => {
                    set.clear(); list.querySelectorAll(`.${cls}:checked`).forEach(b => set.add(b.value));
                    btn.children[0].textContent = set.size; panel.style.display = 'none'; applyFilters(data);
                });
            };
            setup('topic1-filter-btn', 'topic1-filter-panel', 'topic1-filter-list', 'topic1-filter-apply', selectedTopic1, 'topic1-checkbox');
            setup('topic2-filter-btn', 'topic2-filter-panel', 'topic2-filter-list', 'topic2-filter-apply', selectedTopic2, 'topic2-checkbox');
            setup('topic3-filter-btn', 'topic3-filter-panel', 'topic3-filter-list', 'topic3-filter-apply', selectedTopic3, 'topic3-checkbox');
            setup('topic4-filter-btn', 'topic4-filter-panel', 'topic4-filter-list', 'topic4-filter-apply', selectedTopic4, 'topic4-checkbox');

            document.addEventListener('click', (e) => {
                ['topic1-filter-panel', 'topic2-filter-panel', 'topic3-filter-panel', 'topic4-filter-panel'].forEach(id => {
                    const p = document.getElementById(id);
                    if(p && !p.contains(e.target) && !e.target.closest('.filter-button')) p.style.display='none';
                });
            });

            // Generate Button
            const genBtn = document.getElementById('generate-html-btn');
            genBtn.addEventListener('click', () => {
                const rows = tableBody.querySelectorAll('tr');
                if(rows.length > 100 && !confirm(`Generate report for ${rows.length} files? Browser may crash due to large number of files. Safer to keep < 100 files.` )) return;
                
                const pdfBaseUrl = `https://sialaichai.github.io/physynoptic/${PDF_FOLDER}/`;
                let html = `<!DOCTYPE html><html><head><title>Report</title><style>body{font-family:sans-serif;margin:20px;background:#f4f4f4}h1{text-align:center}.pdf-section{margin-bottom:40px;background:#fff;padding:15px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}.header-row{font-size:1.2em;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:5px}embed{width:100%;height:800px;border:1px solid #ccc}</style></head><body><h1>Filtered PDF Report</h1>`;
                
                rows.forEach(r => {
                    const fname = r.cells[0].textContent;
                    const topic1 = r.cells[1].textContent;
                    
                    html += `
                        <div class='pdf-section'>
                            <div class='header-row'>
                                <b>${fname}</b> <span style="color:#666; font-size:0.9em;">(${topic1})</span>
                            </div>
                            <embed src='${pdfBaseUrl}${fname}' type='application/pdf' />
                        </div>
                    `;
                });
                html += `</body></html>`;
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
                a.download = 'filtered_report.html'; a.click();
            });

            // MERGE PDF FUNCTIONALITY (Overlay Banner Style)
            const mergeBtn = document.getElementById('merge-pdf-btn');
            mergeBtn.addEventListener('click', async () => {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                
                if (rows.length === 0) { alert("No files to merge."); return; }
                if (rows.length > 50 && !confirm(`Merging ${rows.length} PDFs is memory intensive and may crash your browser. Continue?`)) return;

                const originalBtnText = mergeBtn.textContent;
                mergeBtn.textContent = "Processing...";
                mergeBtn.disabled = true;

                try {
                    const { PDFDocument, rgb, StandardFonts } = PDFLib;
                    const mergedPdf = await PDFDocument.create();
                    const font = await mergedPdf.embedFont(StandardFonts.HelveticaBold);
                    const pdfBaseUrl = `https://sialaichai.github.io/physynoptic/${PDF_FOLDER}/`;

                    for (let i = 0; i < rows.length; i++) {
                        const r = rows[i];
                        const fname = r.cells[0].textContent; 

                        mergeBtn.textContent = `Merging ${i + 1}/${rows.length}...`;

                        // FIXED: Removed the extra hardcoded /pdfs/ to prevent duplication
                        const fileUrl = `${pdfBaseUrl}${fname}`;
                        const res = await fetch(fileUrl);
                        if (!res.ok) { console.error(`Failed to fetch ${fname}`); continue; }
                        const existingPdfBytes = await res.arrayBuffer();

                        const sourcePdf = await PDFDocument.load(existingPdfBytes);
                        const pages = sourcePdf.getPages(); 
                        
                        for (const page of pages) {
                            // Overlay filename directly on each page
                            page.drawText(`File: ${fname}`, {
                                x: 15,                    
                                y: 15,          
                                size: 10,
                                font: font,
                                color: rgb(1, 0, 0),     
                                opacity: 0.9,            
                            });
                        }
                        
                        const copiedPages = await mergedPdf.copyPages(sourcePdf, sourcePdf.getPageIndices());
                        copiedPages.forEach((page) => mergedPdf.addPage(page));
                    }

                    mergeBtn.textContent = "Finalizing...";
                    const pdfBytes = await mergedPdf.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `merged_pdf_linear_${new Date().toISOString().slice(0,10)}.pdf`;
                    link.click();

                } catch (err) {
                    console.error(err);
                    alert("An error occurred while merging:\n" + err.message);
                } finally {
                    mergeBtn.textContent = originalBtnText;
                    mergeBtn.disabled = false;
                }
            });

            // DOWNLOAD ZIP FUNCTIONALITY
            const zipBtn = document.getElementById('download-zip-btn');
            zipBtn.addEventListener('click', async () => {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                
                if (rows.length === 0) { alert("No files to zip."); return; }
                if (rows.length > 100 && !confirm(`Zipping ${rows.length} files might take a while. Continue?`)) return;

                const originalBtnText = zipBtn.textContent;
                zipBtn.disabled = true;

                try {
                    const zip = new JSZip();
                    const pdfBaseUrl = `https://sialaichai.github.io/physynoptic/${PDF_FOLDER}/`;

                    for (let i = 0; i < rows.length; i++) {
                        const r = rows[i];
                        const fname = r.cells[0].textContent;

                        zipBtn.textContent = `Fetching ${i + 1}/${rows.length}...`;

                        // FIXED: Removed the extra hardcoded /pdfs/ to prevent duplication
                        const fileUrl = `${pdfBaseUrl}${fname}`;
                        const res = await fetch(fileUrl);
                        
                        if (res.ok) {
                            const blob = await res.blob();
                            zip.file(fname, blob);
                        } else {
                            console.error(`Failed to fetch ${fname}`);
                        }
                    }

                    zipBtn.textContent = "Zipping...";
                    const content = await zip.generateAsync({ type: "blob" });
                    
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `synoptic_papers_${new Date().toISOString().slice(0,10)}.zip`;
                    link.click();
                    
                    URL.revokeObjectURL(link.href);

                } catch (err) {
                    console.error(err);
                    alert("An error occurred while creating the zip:\n" + err.message);
                } finally {
                    zipBtn.textContent = originalBtnText;
                    zipBtn.disabled = false;
                }
            });
        }

        function applyFilters(data) {
          let fd = [...data];
        
          if (selectedTopic1.size > 0) fd = fd.filter(i => selectedTopic1.has(i.Topic1));
          if (selectedTopic2.size > 0) fd = fd.filter(i => selectedTopic2.has(i.Topic2));
          if (selectedTopic3.size > 0) fd = fd.filter(i => selectedTopic3.has(i.Topic3));
          if (selectedTopic4.size > 0) fd = fd.filter(i => selectedTopic4.has(i.Topic4));
        
          currentFilteredData = fd; 
          renderTable(currentFilteredData);
        }

        function renderTable(data) {
            // Update Headers with Arrows
            const headers = document.querySelectorAll('#data-table th');
            headers.forEach((th, index) => {
                if (currentSort.column === index) {
                    th.textContent = baseHeaders[index] + (currentSort.asc ? ' ▲' : ' ▼');
                } else {
                    th.textContent = baseHeaders[index];
                }
            });

            // Dynamic Sorting Logic
            data.sort((a, b) => {
                const keys = ['filename', 'Topic1', 'Topic2', 'Topic3', 'Topic4'];
                const key = keys[currentSort.column];
                
                let valA = a[key] || '';
                let valB = b[key] || '';

                return currentSort.asc 
                    ? String(valA).localeCompare(String(valB), undefined, { numeric: true, sensitivity: 'base' })
                    : String(valB).localeCompare(String(valA), undefined, { numeric: true, sensitivity: 'base' });
            });

            tableBody.innerHTML = '';
            const fragment = document.createDocumentFragment();
            const displayData = data.length > 500 ? data.slice(0, 500) : data;
            
            displayData.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.filename}</td>
                    <td>${r.Topic1}</td>
                    <td>${r.Topic2}</td>
                    <td>${r.Topic3}</td>
                    <td>${r.Topic4}</td>
                `;
               
                // 1. Click row to load PDF into main viewer. FIXED: Removed the extra hardcoded /pdfs/ to prevent duplication
                tr.addEventListener('click', () => pdfViewer.src = `${PDF_FOLDER}/${r.filename}`);


                
    
                
                fragment.appendChild(tr);
            });
            tableBody.appendChild(fragment);
            fileCountDisplay.textContent = data.length > 500 ? `Top 500 of ${data.length} files` : `${data.length} files found`;
        }

        // Dragger Resizer
        const dragger = document.getElementById('dragger');
        const lowerPanel = document.getElementById('lower-panel');
        if(dragger && lowerPanel) {
            let isD = false;
            dragger.addEventListener('mousedown', () => { isD = true; document.body.style.userSelect = 'none'; if(pdfViewer) pdfViewer.style.pointerEvents = 'none'; });
            document.addEventListener('mouseup', () => { isD = false; document.body.style.userSelect = 'auto'; if(pdfViewer) pdfViewer.style.pointerEvents = 'auto'; });
            document.addEventListener('mousemove', (e) => { if(isD) lowerPanel.style.height = `${window.innerHeight - e.clientY - 2.5}px`; });
        }
    }
    </script>
</body>
</html>
